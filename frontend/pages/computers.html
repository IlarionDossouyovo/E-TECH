<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="E-Tech - Achetez les meilleurs ordinateurs portables au Benin. MacBook, Dell, HP, Lenovo.">
    <title>Ordinateurs Portables | E-Tech</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../images/logo.svg">
    <style>
        .category-hero { background: linear-gradient(135deg, #0A1929 0%, #1a3a5c 100%); color: white; padding: 60px 0; text-align: center; }
        .category-hero__icon { font-size: 80px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header__content">
            <a href="../index.html" class="header__logo"><div class="header__logo-icon">⚡</div><span>E-Tech</span></a>
            <nav class="header__nav">
                <a href="../index.html">Accueil</a>
                <a href="../products.html">Produits</a>
                <a href="smartphones.html">Smartphones</a>
                <a href="computers.html" class="active">Ordinateurs</a>
                <a href="audio.html">Audio</a>
                <a href="accessories.html">Accessoires</a>
            </nav>
            <div class="header__actions">
                <a href="../cart.html" class="header__cart">🛒 <span class="cart-count">0</span></a>
            </div>
        </div>
    </header>

    <section class="category-hero">
        <div class="container">
            <div class="category-hero__icon">💻</div>
            <h1>Ordinateurs Dernière Génération</h1>
            <p>MacBook, Ultrabooks, PC Gaming - Performance premium</p>
        </div>
    </section>

    <section style="padding: 24px 0; background: #f8f9fa;">
        <div class="container">
            <div style="display: flex; gap: 16px; justify-content: center;">
                <a href="computers.html" class="btn btn--primary">Tous</a>
                <a href="macbook.html" class="btn btn--secondary">MacBook</a>
                <a href="dell.html" class="btn btn--secondary">Dell XPS</a>
                <a href="hp.html" class="btn btn--secondary">HP</a>
                <a href="gaming-pc.html" class="btn btn--secondary">PC Gaming</a>
            </div>
        </div>
    </section>

    <section class="products" style="padding: 48px 0;">
        <div class="container">
            <div class="products__grid" id="products-grid"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p class="footer__copyright">© 2025 E-Tech. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        const products = [
            { id: 4, name: 'MacBook Air M4 15"', brand: 'Apple', price: 1150000, image: '💻', rating: 5, reviews: 67 },
            { id: 14, name: 'MacBook Pro 14" M4', brand: 'Apple', price: 1850000, image: '💻', badge: 'new', rating: 5, reviews: 45 },
            { id: 15, name: 'Dell XPS 15', brand: 'Dell', price: 950000, image: '💻', rating: 4, reviews: 89 },
            { id: 16, name: 'HP Spectre x360', brand: 'HP', price: 780000, image: '💻', badge: 'bestseller', rating: 4, reviews: 56 },
            { id: 17, name: 'Lenovo ThinkPad X1', brand: 'Lenovo', price: 820000, image: '💻', rating: 4, reviews: 34 },
            { id: 18, name: 'ASUS ROG Zephyrus', brand: 'ASUS', price: 1450000, image: '🎮', badge: 'new', rating: 5, reviews: 23 },
            { id: 19, name: 'MSI Raider Gaming', brand: 'MSI', price: 1650000, image: '🎮', rating: 5, reviews: 18 },
            { id: 20, name: 'Alienware m18', brand: 'Alienware', price: 2100000, image: '🎮', badge: 'new', rating: 5, reviews: 12 }
        ];
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('products-grid').innerHTML = products.map(p => `
                <div class="product-card">
                    ${p.badge ? `<div class="product-card__badges"><span class="product-badge product-badge--${p.badge}">${p.badge}</span></div>` : ''}
                    <div class="product-card__image"><div style="font-size:80px;">${p.image}</div></div>
                    <div class="product-card__quick-view">Aperçu Rapide</div>
                    <div class="product-card__content">
                        <p class="product-card__brand">${p.brand}</p>
                        <h3 class="product-card__name">${p.name}</h3>
                        <div class="product-card__rating"><span class="stars">${'★'.repeat(p.rating)}</span><span class="rating-count">(${p.reviews})</span></div>
                        <div class="product-card__price"><span class="product-card__price-current">${formatPrice(p.price)}</span></div>
                        <div class="product-card__actions">
                            <button class="product-card__btn product-card__btn--cart">Ajouter au Panier</button>
                            <button class="product-card__btn product-card__btn--wishlist">♡</button>
                        </div>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
